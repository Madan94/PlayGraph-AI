# Full stack: infra + backend + all workers in Docker.
# Cognee Cloud: set COGNEE_MODE=cloud in ../.env (no local Cognee volumes).
#
# Usage:
#   cd docker
#   docker compose up -d --build
#
# Backend API: http://localhost:8000
# For hybrid dev (backend on host:8002), use docker-compose.workers.yml instead.

x-worker-env: &worker-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: nextplay-assets
  MINIO_SECURE: "false"
  ENABLE_BACKEND_ACCESS_CONTROL: "false"
  COGNEE_MODE: cloud
  PLAYGRAPH_API_URL: http://backend:8000

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.worker
  env_file:
    - ../.env
  restart: unless-stopped
  depends_on:
    redpanda:
      condition: service_healthy
    minio:
      condition: service_healthy
    backend:
      condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nextplay
      POSTGRES_PASSWORD: nextplay
      POSTGRES_DB: nextplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextplay"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nextplay:nextplay@postgres:5432/nextplay
      MINIO_ENDPOINT: minio:9000
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      PLAYGRAPH_API_URL: http://backend:8000
    volumes:
      - ../memory:/app/memory
      - ../backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  json-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: json

  video-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: video

  image-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: image

  audio-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: audio

volumes:
  postgres_data:
  minio_data:
