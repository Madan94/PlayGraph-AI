# Workers + infra. Backend runs on the host (hybrid dev).
# Cognee Cloud: workers POST to backend /memory/ingest — no local Cognee volumes.
#
# Usage:
#   cd docker
#   docker compose -f docker-compose.workers.yml up -d --build
#
# Host .env must have:
#   KAFKA_BOOTSTRAP_SERVERS=localhost:9092   (for host backend)
#   AUTH_INTERNAL_SERVICE_KEY=...              (same as frontend)
# Stop local `python -m workers.main` processes before starting Docker workers.

x-worker-env: &worker-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: nextplay-assets
  MINIO_SECURE: "false"
  ENABLE_BACKEND_ACCESS_CONTROL: "false"
  COGNEE_MODE: cloud
  PLAYGRAPH_API_URL: http://host.docker.internal:8002

x-worker-base: &worker-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.worker
  env_file:
    - ../.env
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    redpanda:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nextplay
      POSTGRES_PASSWORD: nextplay
      POSTGRES_DB: nextplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextplay"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  json-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: json

  video-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: video

  image-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: image

  audio-worker:
    <<: *worker-base
    environment:
      <<: *worker-env
      WORKER_TYPE: audio

volumes:
  postgres_data:
  minio_data:
